<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AI Chase — Continuous Track</title>
  <style>
    body { background:#111; color:#eee; font-family: monospace; display:flex; gap:12px; padding:12px; }
    #canvas { background:#222; image-rendering: pixelated; border: 2px solid #444; }
    #hud { width:300px; }
    .hint { font-size:13px; color:#bbb; }
    
    #gameOverModal {
      position: fixed; left:0; top:0; right:0; bottom:0;
      display:none; align-items:center; justify-content:center;
      background: rgba(0,0,0,0.6); z-index: 999;
    }
    #gameOverModal .box {
      background:#1b1b1b; padding:18px; border-radius:8px; border:1px solid #333; min-width:320px; text-align:center;
    }
    #gameOverModal h2 { margin:0 0 8px 0; color:#ff6666; }
    button { background:#2b2b2b; color:#fff; border:1px solid #444; padding:6px 10px; border-radius:6px; cursor:pointer; }
    button:hover { filter:brightness(1.1); }
  </style>
</head>
<body>
  <canvas id="canvas" width="960" height="620"></canvas>

  <div id="hud">
    <h3>AI Chase — Continuous Track</h3>
    <div id="status">Connecting...</div>
    <p class="hint">Controls: WASD or arrow keys</p>
    <div style="margin-top:10px">
      <strong>Score:</strong> <span id="score">0</span><br/>
      <strong>Coins left:</strong> <span id="coinsLeft">0</span><br/>
      <strong>Mission:</strong> <span id="missionInfo">running</span><br/>
      <strong>Time left:</strong> <span id="timeLeft">--</span><br/>
      <strong>Enemies:</strong> <span id="enemyCount">0</span>
    </div>
    <div style="margin-top:10px">
      <button id="resetBtn">Reset Player</button>
      <button id="resetAllBtn" style="margin-left:8px">Restart Game</button>
    </div>
  </div>

  <div id="gameOverModal">
    <div class="box">
      <h2>Game Over</h2>
      <p id="gameOverText">You were caught by an enemy.</p>
      <div style="margin-top:12px">
        <button id="restartBtn">Restart Game</button>
      </div>
    </div>
  </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let grid = null;
let state = null;
let tileW = 32, tileH = 32;

const statusEl = document.getElementById('status');

let ws = null;
function connect() {
  ws = new WebSocket("ws://127.0.0.1:8000/ws");
  ws.onopen = () => statusEl.textContent = "Connected to server";
  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.type === 'init') {
      grid = msg.grid;
      state = msg.state;
      tileW = canvas.width / grid[0].length;
      tileH = canvas.height / grid.length;
    } else if (msg.type === 'state') {
      state = msg.state;
      
      document.getElementById('score').textContent = state.score || 0;
      document.getElementById('coinsLeft').textContent = (state.coins ? state.coins.length : 0);
      document.getElementById('enemyCount').textContent = (state.enemies ? state.enemies.length : 0);
      if (state.mission) {
        document.getElementById('missionInfo').textContent = state.mission.running ? 'running' : 'finished';
        document.getElementById('timeLeft').textContent = Math.ceil(state.mission.time_left);
      }
      
      if (state.game_over) {
        document.getElementById('gameOverModal').style.display = 'flex';
      } else {
        document.getElementById('gameOverModal').style.display = 'none';
      }
    }
  };
  ws.onclose = () => { statusEl.textContent = "Disconnected"; setTimeout(connect, 1000); };
}
connect();

function sendMessage(obj){
  if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj));
}


let input = {dx:0, dy:0};
function sendInput() {
  sendMessage({type:'input', dx: input.dx, dy: input.dy});
}
window.addEventListener('keydown', (e) => {
  if (e.key === 'w' || e.key === 'ArrowUp') { input.dy = -1; }
  if (e.key === 's' || e.key === 'ArrowDown') { input.dy = 1; }
  if (e.key === 'a' || e.key === 'ArrowLeft') { input.dx = -1; }
  if (e.key === 'd' || e.key === 'ArrowRight') { input.dx = 1; }
  sendInput();
});
window.addEventListener('keyup', (e) => {
  if (['w','ArrowUp','s','ArrowDown'].includes(e.key)) input.dy = 0;
  if (['a','ArrowLeft','d','ArrowRight'].includes(e.key)) input.dx = 0;
  sendInput();
});


document.getElementById('resetBtn').onclick = () => sendMessage({type:'reset'});
document.getElementById('resetAllBtn').onclick = () => sendMessage({type:'reset_all'});
document.getElementById('restartBtn').onclick = () => sendMessage({type:'reset_all'});


function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if (!grid || !state) {
    ctx.fillStyle = "#aaa";
    ctx.fillText("Waiting for server...", 20,20);
    requestAnimationFrame(draw);
    return;
  }
  const rows = grid.length, cols = grid[0].length;
  tileW = canvas.width / cols;
  tileH = canvas.height / rows;

  
  for (let y=0;y<rows;y++){
    for (let x=0;x<cols;x++){
      if (grid[y][x] === 1) ctx.fillStyle = "#333";
      else ctx.fillStyle = "#151515";
      ctx.fillRect(x*tileW, y*tileH, tileW, tileH);
      ctx.strokeStyle = "#1e1e1e";
      ctx.strokeRect(x*tileW, y*tileH, tileW, tileH);
    }
  }

  
  for (const c of state.coins) {
    ctx.fillStyle = "#ffd700";
    ctx.beginPath();
    ctx.arc((c.x+0.5)*tileW, (c.y+0.5)*tileH, Math.min(tileW,tileH)*0.18, 0, Math.PI*2);
    ctx.fill();
  }

  
  for (const e of state.enemies) {
    if (e.last_seen) {
      ctx.fillStyle = "rgba(255,200,0,0.6)";
      ctx.beginPath();
      ctx.arc((e.last_seen[0]+0.5)*tileW, (e.last_seen[1]+0.5)*tileH, Math.min(tileW,tileH)*0.12, 0, Math.PI*2);
      ctx.fill();
    }
  }

  
  for (const e of state.enemies) {
    
    if (e.path && e.path.length>0) {
      ctx.strokeStyle = "rgba(0,200,255,0.5)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i=0;i<e.path.length;i++){
        const p = e.path[i];
        const cx = (p[0]+0.5)*tileW;
        const cy = (p[1]+0.5)*tileH;
        if (i===0) ctx.moveTo(cx,cy); else ctx.lineTo(cx,cy);
      }
      ctx.stroke();
    }
    
    ctx.fillStyle = "#ff5555";
    ctx.fillRect((e.x+0.15)*tileW, (e.y+0.15)*tileH, tileW*0.7, tileH*0.7);
    
    ctx.fillStyle = "#fff";
    ctx.font = "11px monospace";
    ctx.fillText(e.state||"", e.x*tileW, e.y*tileH - 4);
  }

 
  const p = state.player;
  ctx.fillStyle = "#66ff66";
  ctx.beginPath();
  ctx.arc((p.x+0.5)*tileW, (p.y+0.5)*tileH, Math.min(tileW,tileH)*0.33, 0, Math.PI*2);
  ctx.fill();

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
